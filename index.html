<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:  #4cd964;
      --accent:   #00f2fe;
      --accent2:  #4facfe;
      --danger:   #ff2d55;
      --warning:  #ffcc00;
      --card:     rgba(255,255,255,0.06);
      --card-ft:  rgba(79,172,254,0.07);
      --border:   rgba(255,255,255,0.12);
      --border-ft:rgba(79,172,254,0.4);
      --text:     #ffffff;
      --sub:      #a0a0b0;
    }
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0; padding: 24px 16px 60px;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #0a0c18, #14172a);
      color: var(--text); min-height: 100vh;
    }
    .container { max-width: 1080px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

    /* Header */
    .hd { text-align: center; padding: 4px 0 8px; }
    h1 { margin: 0; font-size: 1.85rem;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hd-sub { color: var(--sub); font-size: .84rem; margin-top: 5px; }
    .hd-upd { color: rgba(160,160,176,.45); font-size: .72rem; margin-top: 3px; }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; }
    .card.ft { background: var(--card-ft); border-color: var(--border-ft); box-shadow: 0 0 40px rgba(79,172,254,.08); }
    h2 { margin: 0 0 14px; font-size: 1.05rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    h3 { margin: 16px 0 8px; font-size: .82rem; color: var(--accent); letter-spacing: .6px; text-transform: uppercase; }

    /* Badges / Priority */
    .badge { font-size: .68rem; padding: 3px 9px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
    .run  { background: rgba(76,217,100,.18); color: var(--primary); }
    .plan { background: rgba(255,204,0,.18);  color: var(--warning); }
    .pend { background: rgba(255,45,85,.18);  color: var(--danger);  }
    .ph { color: #ff6b7a; font-size: .7rem; font-weight: 700; white-space: nowrap; }
    .pm { color: #ffd166; font-size: .7rem; font-weight: 700; white-space: nowrap; }
    .pl { color: #4cd964; font-size: .7rem; font-weight: 700; white-space: nowrap; }
    .pf { color: var(--sub); font-size: .7rem; white-space: nowrap; }

    /* Status dot */
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .dt { background: rgba(255,255,255,.25); }
    .dd { background: #ffd166; }
    .dn { background: var(--primary); }
    .df { background: rgba(255,255,255,.12); }

    /* Progress bar */
    .pb { height: 5px; background: rgba(255,255,255,.1); border-radius: 4px; overflow: hidden; margin-top: 7px; }
    .pf-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 4px; }

    /* Buttons */
    a.btn { text-decoration: none; color: #fff; background: rgba(255,255,255,.1);
      padding: 5px 11px; border-radius: 7px; font-size: .75rem; border: 1px solid var(--border); white-space: nowrap; }
    a.btn:hover { background: rgba(255,255,255,.18); }
    a.btn.ac { background: rgba(79,172,254,.14); border-color: rgba(79,172,254,.4); color: var(--accent); }
    .links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

    /* Meta row */
    .meta { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .meta-label { font-size: .75rem; color: var(--sub); white-space: nowrap; }
    .meta-bar { flex: 1; }
    .pct { font-size: .7rem; color: var(--sub); margin-top: 2px; }

    /* Completed list */
    ul.done-list { list-style: none; padding: 0; margin: 0; }
    ul.done-list li { font-size: .82rem; color: var(--sub); padding: 3px 0; display: flex; gap: 7px; }
    ul.done-list li::before { content: "✓"; color: var(--primary); font-weight: 700; flex-shrink: 0; }

    /* WBS Accordion */
    .acc { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
    .acc-hd { display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; cursor: pointer; background: rgba(255,255,255,.03); user-select: none; }
    .acc-hd:hover { background: rgba(255,255,255,.06); }
    .acc-title { font-weight: 600; font-size: .85rem; display: flex; align-items: center; gap: 6px; }
    .arr { color: var(--sub); font-size: .7rem; transition: transform .18s; display: inline-block; }
    .arr.open { transform: rotate(90deg); }
    .acc-body { padding: 6px 14px 10px; display: none; }

    /* WBS Task */
    .wt { display: flex; align-items: flex-start; gap: 9px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
    .wt:last-child { border-bottom: none; padding-bottom: 0; }
    .wt-body { flex: 1; min-width: 0; }
    .wt-name { font-size: .83rem; line-height: 1.4; }
    .wt-id { font-size: .7rem; color: var(--sub); margin-right: 4px; }
    .wt-detail { font-size: .74rem; color: var(--sub); margin-top: 2px; line-height: 1.5; }

    /* Projects */
    .proj { padding: 11px 0; border-bottom: 1px solid var(--border); }
    .proj:last-child { border-bottom: none; }
    .proj-hd { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
    .proj-name { font-weight: 700; font-size: .93rem; }
    .proj-right { display: flex; align-items: center; gap: 7px; }
    .desc { color: var(--sub); font-size: .82rem; line-height: 1.55; }
    .sub-items { margin-top: 6px; padding-left: 12px; border-left: 2px solid rgba(255,255,255,.08); }
    .sub-item { font-size: .76rem; color: rgba(160,160,176,.7); padding: 2px 0; }
    .sub-item::before { content: "↳ "; color: var(--accent2); }

    /* ── Calendar ── */
    .cal-wrap { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
    .cal-left { flex-shrink: 0; }
    .cal-month-label { font-size: .8rem; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 8px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 34px); gap: 2px; }
    .cal-dh { width: 34px; height: 22px; display: flex; align-items: center; justify-content: center;
      font-size: .62rem; color: var(--sub); font-weight: 600; }
    .cal-dh.sun { color: #ff6b7a; } .cal-dh.sat { color: var(--accent2); }
    .cal-cell { width: 34px; height: 34px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; border-radius: 7px; font-size: .78rem; color: var(--sub); position: relative; }
    .cal-cell.today { background: rgba(79,172,254,.2); color: var(--accent); font-weight: 700; }
    .cal-cell.has-ev { color: var(--text); }
    .cal-cell.sunday { color: rgba(255,107,122,.6); }
    .cal-cell.saturday { color: rgba(79,172,254,.6); }
    .cal-cell.today.sunday, .cal-cell.today.saturday { color: var(--accent); }
    .cal-dots { display: flex; gap: 2px; margin-top: 2px; }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; }
    .dot-oshipay { background: var(--accent); }
    .dot-autocraft { background: var(--warning); }
    .dot-blog { background: var(--primary); }
    .dot-other { background: var(--sub); }

    .cal-right { flex: 1; min-width: 220px; }
    .cal-ms-title { font-size: .75rem; color: var(--accent); font-weight: 700; letter-spacing: .5px;
      text-transform: uppercase; margin-bottom: 8px; }
    .cal-ms { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.05); }
    .cal-ms:last-child { border-bottom: none; }
    .cal-ms-date { font-size: .7rem; color: var(--accent2); white-space: nowrap; width: 52px; flex-shrink: 0; padding-top: 1px; }
    .cal-ms-date.overdue { color: var(--danger); }
    .cal-ms-body { flex: 1; }
    .cal-ms-label { font-size: .8rem; color: var(--sub); line-height: 1.4; }
    .cal-ms-proj { font-size: .65rem; margin-top: 2px; }
    .cal-ms-proj.oshipay  { color: var(--accent); }
    .cal-ms-proj.autocraft{ color: var(--warning); }
    .cal-ms-proj.blog     { color: var(--primary); }
    .cal-nav { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 10px; }
    .cal-nav-btn { background: rgba(255,255,255,.08); border: 1px solid var(--border); color: var(--sub);
      border-radius: 6px; padding: 3px 10px; font-size: .75rem; cursor: pointer; }
    .cal-nav-btn:hover { background: rgba(255,255,255,.14); color: var(--text); }
    .cal-nav-label { font-size: .72rem; color: var(--sub); min-width: 70px; text-align: center; }

    /* Notion 棲み分け */
    .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px; }
    .split-item { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .split-item.html-side { border-color: rgba(79,172,254,.35); background: rgba(79,172,254,.05); }
    .split-item.notion-side { border-color: rgba(255,204,0,.25); background: rgba(255,204,0,.04); }
    .split-head { font-size: .85rem; font-weight: 700; margin-bottom: 8px; }
    .split-rule { font-size: .7rem; font-weight: 600; margin: 6px 0 4px; color: var(--sub); letter-spacing: .3px; }
    .split-item ul { list-style: none; padding: 0; margin: 0; }
    .split-item li { font-size: .78rem; color: var(--sub); padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .split-item li:last-child { border-bottom: none; }
    .split-item.html-side li::before { content: "• "; color: var(--accent2); }
    .split-item.notion-side li::before { content: "• "; color: var(--warning); }
    .split-rule-box { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 14px; font-size: .78rem; color: var(--sub); text-align: center; margin-top: 4px; }
    .split-rule-box strong { color: var(--text); }

    /* Focus list */
    ul.fl { list-style: none; padding: 0; margin: 0; }
    ul.fl li { display: flex; gap: 8px; align-items: flex-start; padding: 7px 0;
      border-bottom: 1px solid var(--border); font-size: .86rem; color: var(--sub); }
    ul.fl li:last-child { border-bottom: none; }
    ul.fl li::before { content: "▶"; color: var(--accent); font-size: .68rem; margin-top: 4px; flex-shrink: 0; }

    /* KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
    .kpi-item { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; }
    .kpi-lbl { font-size: .73rem; color: var(--sub); margin-bottom: 4px; }
    .kpi-val { font-size: 1rem; font-weight: 700; color: var(--accent); }
    .kpi-tgt { font-size: .68rem; color: rgba(160,160,176,.55); margin-top: 3px; }

    /* Sub WBS */
    .sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .sub-card { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .sub-card h4 { margin: 0 0 10px; font-size: .9rem; }
    .st { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: .8rem; color: var(--sub); }
    .st:last-child { border-bottom: none; }
    .st-name { flex: 1; line-height: 1.45; }

    /* Blocker banner */
    .blocker-banner { background: rgba(255,45,85,.12); border: 1px solid rgba(255,45,85,.5);
      border-radius: 14px; padding: 16px 20px; display: flex; align-items: flex-start; gap: 14px; }
    .blocker-icon { font-size: 1.6rem; flex-shrink: 0; line-height: 1; }
    .blocker-body { flex: 1; }
    .blocker-title { font-size: .95rem; font-weight: 700; color: var(--danger); margin-bottom: 4px; }
    .blocker-note { font-size: .8rem; color: rgba(255,100,120,.8); line-height: 1.6; }
    .blocker-deadline { font-size: .72rem; color: var(--danger); margin-top: 6px; font-weight: 600; }
    .blocker-days { font-size: 1.4rem; font-weight: 700; color: var(--danger); line-height: 1;
      background: rgba(255,45,85,.15); border-radius: 8px; padding: 6px 12px; text-align: center; flex-shrink: 0; }
    .blocker-days span { font-size: .65rem; font-weight: 400; color: rgba(255,100,120,.8); display: block; margin-top: 2px; }

    @media (max-width: 640px) {
      h1 { font-size: 1.35rem; }
      .card { padding: 16px 14px; }
      .split-grid { grid-template-columns: 1fr; }
      .cal-wrap { flex-direction: column; }
    }
  </style>
</head>

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const SL = { run:"RUN", plan:"PLAN", pend:"HOLD" }
const PROJ_COLOR = { oshipay2:"oshipay", autocraft:"autocraft", blog:"blog", other:"other" }

function dotH(st) {
  const c = { todo:"dt", doing:"dd", done:"dn", future:"df" }[st] || "dt"
  return `<div class="dot ${c}"></div>`
}
function prH(p) {
  return p==="high" ? `<span class="ph">🔴 高</span>`
       : p==="mid"  ? `<span class="pm">🟡 中</span>`
       : p==="low"  ? `<span class="pl">🟢 低</span>`
       :               `<span class="pf">⚪ 将来</span>`
}
function fmtDate(str) {
  const d = new Date(str)
  return `${d.getMonth()+1}/${d.getDate()}`
}
function isOverdue(str) {
  return new Date(str) < new Date(new Date().toDateString())
}

// ═══════════════════════════════════════════
//  CALENDAR
// ═══════════════════════════════════════════
let calYear, calMonth
function initCal() {
  const now = new Date()
  calYear  = now.getFullYear()
  calMonth = now.getMonth()
}
function renderCalendar() {
  const now      = new Date()
  const today    = now.getDate()
  const isCurMo  = now.getFullYear()===calYear && now.getMonth()===calMonth
  const firstDay = new Date(calYear, calMonth, 1).getDay()       // 0=Sun
  const days     = new Date(calYear, calMonth+1, 0).getDate()
  const monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"]

  // Build event map for current calendar month
  const evMap = {}
  D.milestones.forEach(m => {
    const d = new Date(m.date)
    if (d.getFullYear()===calYear && d.getMonth()===calMonth) {
      const k = d.getDate()
      if (!evMap[k]) evMap[k] = []
      evMap[k].push(m)
    }
  })

  // Grid
  let g = `<div class="cal-month-label">${calYear}年 ${monthNames[calMonth]}</div>
    <div class="cal-grid">`
  ;["日","月","火","水","木","金","土"].forEach((d,i) =>
    g += `<div class="cal-dh${i===0?' sun':i===6?' sat':''}">${d}</div>`)
  for (let i=0;i<firstDay;i++) g += `<div class="cal-cell"></div>`
  for (let d=1;d<=days;d++) {
    const dow   = (firstDay + d - 1) % 7
    const cls   = [
      isCurMo && d===today ? "today" : "",
      dow===0 ? "sunday" : dow===6 ? "saturday" : "",
      evMap[d] ? "has-ev" : ""
    ].filter(Boolean).join(" ")
    let dots = ""
    if (evMap[d]) {
      dots = `<div class="cal-dots">`
      evMap[d].forEach(e => dots += `<div class="cal-dot dot-${PROJ_COLOR[e.proj]||'other'}"></div>`)
      dots += `</div>`
    }
    g += `<div class="cal-cell ${cls}">${d}${dots}</div>`
  }
  g += `</div>`
  g += `<div class="cal-nav">
    <button class="cal-nav-btn" onclick="moveCal(-1)">◀</button>
    <span class="cal-nav-label">月移動</span>
    <button class="cal-nav-btn" onclick="moveCal(1)">▶</button>
  </div>`

  // Upcoming milestones (today → +70 days)
  const lo = new Date(); lo.setHours(0,0,0,0)
  const hi = new Date(lo); hi.setDate(hi.getDate()+70)
  const upcoming = D.milestones
    .filter(m => { const d=new Date(m.date); return d>=lo && d<=hi })
    .sort((a,b)=>new Date(a.date)-new Date(b.date))

  let ms = `<div class="cal-ms-title">📌 直近マイルストーン</div>`
  if (!upcoming.length) {
    ms += `<div style="font-size:.78rem;color:var(--sub)">マイルストーンなし</div>`
  } else {
    upcoming.forEach(m => {
      const od = isOverdue(m.date)
      ms += `<div class="cal-ms">
        <div class="cal-ms-date${od?' overdue':''}">${fmtDate(m.date)}${od?' ⚠':''}
        </div>
        <div class="cal-ms-body">
          <div class="cal-ms-label">${m.label}</div>
          <div class="cal-ms-proj ${m.proj||'other'}">${
            m.proj==='oshipay2'?'OshiPay2':m.proj==='autocraft'?'AutoCraft':m.proj==='blog'?'副業ブログ':'その他'
          }</div>
        </div>
        ${prH(m.pr)}
      </div>`
    })
  }

  document.getElementById("cal-grid-wrap").innerHTML = g
  document.getElementById("cal-ms-wrap").innerHTML   = ms
}
function moveCal(dir) {
  calMonth += dir
  if (calMonth < 0)  { calMonth=11; calYear-- }
  if (calMonth > 11) { calMonth=0;  calYear++ }
  renderCalendar()
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════

  })
}

/* Header */

</div>`

    <div class="split-item html-side">

/* ── Calendar ── */
h += `<div class="card">

    <div class="cal-left">
      <div id="cal-grid-wrap"></div>

</div>`

/* ── OshiPay2 (featured) ── */
const m = D.main
h += `<div class="card ft">
  <h2>🔥 メインプロジェクト &nbsp;<span style="font-weight:400;font-size:.85rem;color:var(--accent)">${m.name}</span></h2>
  <div class="desc">${m.desc}</div>
  <div class="meta">
    <span class="meta-label">📊 進捗</span>
    <div class="meta-bar">
      <div class="pb"><div class="pf-bar" style="width:${m.progress}%"></div></div>
      <div class="pct">${m.progress}%</div>
    </div>
  </div>
  <div class="links">`
m.links.forEach(l => h += `<a href="${l.url}" target="_blank" class="btn ac">${l.label}</a>`)

  <h3>✅ 実装済み</h3>

m.done.forEach(d => h += `<li>${d}</li>`)

  <h3>📋 WBS — 残タスク</h3>`
m.wbs.forEach((ep,ei) => {

      <span class="${ep.prClass}">${ep.prLabel}</span>

  ep.tasks.forEach(t => h += `<div class="wt">
    ${dotH(t.st)}
    <div class="wt-body">
      <div class="wt-name"><span class="wt-id">[${t.id}]</span>${t.name}</div>
      <div class="wt-detail">${t.detail}</div>
    </div>
    ${prH(t.pr)}
  </div>`)
  h += `</div></div>`
})
h += `</div>` // end featured

/* ── Projects overview ── */
h += `<div class="card"><h2>🚀 プロジェクト全体像</h2>`
D.projects.forEach(p => {
  h += `<div class="proj">
    <div class="proj-hd">
      <div class="proj-name">${p.name}</div>
      <div class="proj-right">
        <span class="badge ${p.status}">${SL[p.status]}</span>
        ${p.link?`<a href="${p.link}" target="_blank" class="btn">Open →</a>`:""}

    <div class="desc">${p.desc}</div>`

    h += `<div class="sub-items">`

    h += `</div>`
  }
  h += `<div class="pb"><div class="pf-bar" style="width:${p.progress}%"></div></div></div>`
})
h += `</div>`

/* ── Sub WBS ── */
h += `<div class="card"><h2>📋 サブプロジェクト WBS</h2><div class="sub-grid">`
D.subWbs.forEach(sp => {

  sp.tasks.forEach(t => h += `<div class="st">${dotH("todo")}<span class="st-name">${t.name}</span>${prH(t.pr)}</div>`)
  h += `</div>`
})
h += `</div></div>`

/* ── Focus ── */
h += `<div class="card"><h2>🎯 現在の最重要フォーカス</h2><ul class="fl">`
D.focus.forEach(f => h += `<li>${f}</li>`)
h += `</ul></div>`

/* ── KPI ── */
h += `<div class="card"><h2>📊 追うべき KPI</h2><div class="kpi-grid">`
D.kpi.forEach(k => h += `<div class="kpi-item">
  <div class="kpi-lbl">${k.lbl}</div>
  <div class="kpi-val">${k.val}</div>
  <div class="kpi-tgt">目標: ${k.tgt}</div>
</div>`)

initCal()
renderCalendar()

// Accordion default open: Epic A, D
;["ep0","ep3"].forEach(id => {
  const b = document.getElementById(id)
  const a = document.getElementById("ar-"+id)
  if (b) b.style.display="block"
  if (a) a.classList.add("open")
})

function tog(id) {
  const b = document.getElementById(id)
  const a = document.getElementById("ar-"+id)
  const o = b.style.display==="block"
  b.style.display = o?"none":"block"
  if (a) a.classList.toggle("open",!o)
}
